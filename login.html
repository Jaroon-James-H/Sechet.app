<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachet | Secure Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: #f8fafc;
            padding: 24px;
            background: linear-gradient(135deg, #020617 0%, #111827 45%, #172554 100%);
            overflow: hidden;
        }
        body:before, body:after {
            content: "";
            position: fixed;
            width: 360px;
            height: 360px;
            border-radius: 999px;
            filter: blur(10px);
            opacity: .45;
        }
        body:before { background: #2563eb; top: -120px; left: -80px; }
        body:after { background: #7c3aed; bottom: -140px; right: -80px; }
        .login-card {
            position: relative;
            width: min(430px, 100%);
            padding: 42px;
            border-radius: 30px;
            background: rgba(15, 23, 42, .82);
            border: 1px solid rgba(148, 163, 184, .24);
            box-shadow: 0 30px 90px rgba(0,0,0,.45);
            backdrop-filter: blur(22px);
        }
        .logo { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; background: linear-gradient(135deg, #3b82f6, #a855f7); font-weight: 1000; font-size: 24px; margin: 0 auto 18px; }
        h1 { margin: 0; text-align: center; font-size: 34px; letter-spacing: -1px; }
        .sub { text-align: center; color: #94a3b8; line-height: 1.6; margin: 12px 0 28px; }
        input {
            width: 100%;
            padding: 15px 16px;
            margin: 10px 0;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, .25);
            background: rgba(2, 6, 23, .7);
            color: white;
            outline: none;
            font-size: 15px;
        }
        input:focus { border-color: #60a5fa; box-shadow: 0 0 0 4px rgba(96,165,250,.14); }
        .btn-login {
            width: 100%;
            margin-top: 14px;
            padding: 15px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            color: white;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(37,99,235,.26);
        }
        .btn-login:hover { transform: translateY(-2px); }
        .helper { margin-top: 22px; text-align: center; color: #94a3b8; }
        .helper a { color: #93c5fd; font-weight: 800; text-decoration: none; }
        .flash { background: rgba(248,113,113,.15); color: #fecaca; border: 1px solid rgba(248,113,113,.25); padding: 12px; border-radius: 14px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="logo">S</div>
        <h1>Welcome Back</h1>
        <p class="sub">Login once and Sachet will send you to the correct learner or creator dashboard.</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <input type="text" name="u" placeholder="Username" required>
            <input type="password" name="p" placeholder="Password" required>
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
        <div class="helper">New to Sachet? <a href="/signup">Create account</a></div>
    </main>
</body>
</html>
